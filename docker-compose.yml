services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chatbot_network

  llama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - chatbot_network

  webapp:
    build: ./webapp
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      OLLAMA_URL: http://llama:11434
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "True"
    depends_on:
      - db
      - llama
    networks:
      - chatbot_network

volumes:
  postgres_data:
  ollama_data:

networks:
  chatbot_network:
    driver: bridge
